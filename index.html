<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strawberry Cat Pomodoro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --theme-color: #ff3b3b;
            --header-bg: rgba(255, 59, 59, 0.18); 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            color: #333;
        }

        .header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
            min-height: 52px;
        }

        .app-container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding-top: 20px;
        }

        .theme-icon {
            position: absolute;
            right: 40px;
            top: 20px;
            cursor: pointer;
            font-size: 22px;
            color: #aaa;
            z-index: 10;
        }

        .welcome-text { font-size: 1rem; color: #555; }

        .goal-row { margin: 20px 0; font-size: 1.4rem; }
        .goal-row input {
            border: none;
            border-bottom: 2px solid #eee;
            outline: none;
            padding: 5px;
            width: 250px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* SHIFTED UP: margin-top reduced from 40px to 10px */
        .timer-box {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 10px auto 10px auto; 
        }

        svg { transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: var(--header-bg); stroke-width: 18; }
        
        .ring-progress {
            fill: none;
            stroke: var(--theme-color);
            stroke-width: 23; 
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .strawberry-cat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 272px;
            height: auto;
            z-index: 1;
        }

        .time-text {
            font-size: 4.5rem;
            font-weight: 500;
            margin: -10px 0 25px 0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .buttons { 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            margin-bottom: 40px; 
        }

        .circle-btn {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #theme-modal {
            display: none;
            position: absolute;
            top: 60px;
            right: 40px;
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            z-index: 100;
            width: 240px;
            text-align: left;
            border: 1px solid #f0f0f0;
        }

        .setting-section { margin-bottom: 15px; }
        .setting-label { font-size: 11px; letter-spacing: 1px; color: #999; font-weight: bold; margin-bottom: 8px; }
        .colors { display: flex; gap: 10px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 6px; cursor: pointer; }
        
        .custom-picker-wrapper {
            position: relative;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            overflow: hidden;
            background: linear-gradient(45deg, red, orange, yellow, green, indigo, violet);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        #custom-color-input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .time-input-group { display: flex; gap: 10px; align-items: center; }
        .time-box-input {
            width: 45px; height: 35px; border: 1px solid #eee; border-radius: 8px;
            text-align: center; font-size: 14px; background: #f9f9f9;
        }

        .no-break-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="timer-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="header">
        <div id="status-text" class="welcome-text" style="font-weight: 500;">🍓 Welcome to pomodoro Strawberry Cat!</div>
    </div>

    <div class="app-container">
        <div class="theme-icon" onclick="toggleThemeModal()">⚙️</div>

        <div id="theme-modal">
            <div style="font-size: 14px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between;">
                <span>SETTINGS</span>
                <span style="cursor:pointer" onclick="toggleThemeModal()">✕</span>
            </div>
            
            <div class="setting-section">
                <div class="setting-label">Theme Color</div>
                <div class="colors">
                    <div class="dot" style="background:#ff3b3b" onclick="changeTheme('#ff3b3b')"></div>
                    <div class="dot" style="background:#4caf50" onclick="changeTheme('#4caf50')"></div>
                    <div class="dot" style="background:#e91e63" onclick="changeTheme('#e91e63')"></div>
                    <div class="custom-picker-wrapper">
                        +
                        <input type="color" id="custom-color-input" oninput="changeTheme(this.value)">
                    </div>
                </div>
            </div>

            <div class="setting-section">
                <div class="setting-label">Work Duration</div>
                <div class="time-input-group">
                    <input type="number" id="work-min" class="time-box-input" value="45">
                    <span>:</span>
                    <input type="number" id="work-sec" class="time-box-input" value="00">
                </div>
            </div>

            <div class="setting-section">
                <label class="no-break-toggle">
                    <input type="checkbox" id="skip-break-checkbox" onchange="toggleBreakInputVisibility()"> Disable Breaks
                </label>
            </div>

            <div class="setting-section" id="break-setting-area">
                <div class="setting-label">Break Duration</div>
                <div class="time-input-group">
                    <input type="number" id="break-min" class="time-box-input" value="5">
                    <span>:</span>
                    <input type="number" id="break-sec" class="time-box-input" value="00">
                </div>
            </div>

            <button onclick="applySettings()" style="width:100%; padding:10px; background:#000; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:12px; font-weight:bold;">Apply Changes</button>
        </div>

        <div class="goal-row">Goal : <input type="text" placeholder="Type your goal here"></div>

        <div class="timer-box">
            <svg width="350" height="350" viewBox="0 0 400 400">
                <circle class="ring-track" cx="200" cy="200" r="156"></circle>
                <circle id="progress-ring" class="ring-progress" cx="200" cy="200" r="156"></circle>
            </svg>
            <img src="Cat_strawberry-removebg-preview.png" alt="Strawberry Cat" class="strawberry-cat">
        </div>

        <div class="time-text"><span id="timer-display">45:00</span></div>

        <div class="buttons">
            <button class="circle-btn" id="state-btn" onclick="toggleTimer()">▶</button>
            <button class="circle-btn" onclick="resetTimer()">↻</button>
        </div>
    </div>

    <script>
        let isBreak = false;
        let workSeconds = 45 * 60;
        let breakSeconds = 5 * 60;
        let total = workSeconds;
        let remaining = total;
        let timerRunning = false;
        let countdown = null;

        const progressRing = document.getElementById('progress-ring');
        const timerDisplay = document.getElementById('timer-display');
        const stateBtn = document.getElementById('state-btn');
        const themeModal = document.getElementById('theme-modal');
        const timerSound = document.getElementById('timer-sound');
        const statusText = document.getElementById('status-text');
        const skipBreakCheck = document.getElementById('skip-break-checkbox');
        const breakArea = document.getElementById('break-setting-area');

        const radius = 156;
        const circumference = 2 * Math.PI * radius;
        progressRing.style.strokeDasharray = circumference;

        function toggleBreakInputVisibility() {
            if (skipBreakCheck.checked) {
                breakArea.classList.add('hidden');
            } else {
                breakArea.classList.remove('hidden');
            }
        }

        function updateDisplay() {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            const elapsed = total - remaining;
            const percentage = elapsed / total;
            progressRing.style.strokeDashoffset = circumference - (percentage * circumference);
        }

        function launchConfetti() {
            const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
            confetti({
                particleCount: 200, spread: 130, origin: { y: 0.65 }, scalar: 1.2,
                colors: [themeColor, '#ffffff', '#ffd1dc']
            });
        }

        function toggleTimer() {
            if (timerRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            timerRunning = true;
            stateBtn.innerText = "II";
            countdown = setInterval(() => {
                if (remaining > 0) { 
                    remaining--; 
                    updateDisplay(); 
                } else {
                    handleSessionEnd();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(countdown);
            timerRunning = false;
            stateBtn.innerText = "▶";
        }

        function handleSessionEnd() {
            stopTimer();
            timerSound.currentTime = 0;
            timerSound.play();

            if (!isBreak) {
                launchConfetti();
                if (skipBreakCheck.checked) {
                    statusText.innerText = "Focus Session Complete! 🍓";
                    remaining = workSeconds;
                    total = workSeconds;
                    updateDisplay();
                } else {
                    statusText.innerText = "✨ Time to Relax! 🍓";
                    isBreak = true;
                    total = breakSeconds;
                    remaining = total;
                    updateDisplay();
                    startTimer(); 
                }
            } else {
                statusText.innerText = "🍓 Welcome to pomodoro Strawberry Cat!";
                isBreak = false;
                total = workSeconds;
                remaining = total;
                updateDisplay();
                startTimer(); 
            }
        }

        function applySettings() {
            workSeconds = (parseInt(document.getElementById('work-min').value) || 0) * 60 + (parseInt(document.getElementById('work-sec').value) || 0);
            breakSeconds = (parseInt(document.getElementById('break-min').value) || 0) * 60 + (parseInt(document.getElementById('break-sec').value) || 0);
            resetTimer();
            toggleThemeModal();
        }

        function resetTimer() {
            stopTimer();
            isBreak = false;
            statusText.innerText = "🍓 Welcome to pomodoro Strawberry Cat!";
            total = workSeconds;
            remaining = total;
            updateDisplay();
        }

        function toggleThemeModal() {
            themeModal.style.display = (themeModal.style.display === 'block') ? 'none' : 'block';
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--theme-color', color);
            const r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
            document.documentElement.style.setProperty('--header-bg', `rgba(${r}, ${g}, ${b}, 0.18)`);
        }

        updateDisplay();
    </script>
</body>
</html>
